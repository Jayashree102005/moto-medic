<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MotoMedic | Create Account</title>
  <link rel="icon" href="images/logo.jpeg">
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Bootstrap Icons Link -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Poppins', sans-serif; transition: background 0.3s, color 0.3s; }
    [data-theme="dark"] body { background-color: #0F172A; color: #F8FAFC; }
    [data-theme="dark"] .auth-card { background-color: #1E293B; border-color: #334155; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
    [data-theme="dark"] input { background-color: #0F172A; border-color: #334155; color: #F8FAFC; }
    [data-theme="dark"] .btn-social { background-color: #0F172A; border-color: #334155; color: #F8FAFC; }
    [data-theme="dark"] .btn-social:hover { background-color: #334155; }
    [data-theme="dark"] .theme-btn { background-color: #1E293B !important; border-color: #334155 !important; color: #F8FAFC !important; }
    [data-theme="dark"] .text-slate-900 { color: #F8FAFC !important; }
    [data-theme="dark"] .title-brand { color: #F8FAFC !important; }
    [data-theme="dark"] .text-zinc-500 { color: #94A3B8 !important; }
    [data-theme="dark"] .text-zinc-400 { color: #64748B !important; }
    [data-theme="dark"] .bg-zinc-200 { background-color: #334155 !important; }
  </style>
</head>
<body class="bg-slate-50 min-h-full flex flex-col w-full antialiased selection:bg-orange-500 selection:text-white">

  <!-- Main Wrapper with dynamic vertical layout padding -->
  <div class="flex-grow flex flex-col justify-center items-center px-4 py-6 sm:p-8">
    
    <!-- Floating Controls (Responsive spacing) -->
    <div class="w-full max-w-md flex justify-end gap-2 mb-3 sm:mb-4">
      <button onclick="toggleTheme()" class="theme-btn bg-white border border-slate-200 p-2.5 sm:p-3 rounded-xl shadow-sm hover:scale-105 active:scale-95 transition cursor-pointer"> 
        <i id="themeIcon" class="bi bi-moon-fill text-sm sm:text-base"></i>
      </button>
      <button onclick="toggleRTL()" class="theme-btn bg-white border border-slate-200 p-2.5 sm:p-3 rounded-xl shadow-sm hover:scale-105 active:scale-95 transition cursor-pointer"> 
        <i class="bi bi-arrow-left-right text-sm sm:text-base"></i>
      </button>
    </div>

    <!-- Auth Card -->
    <div class="auth-card bg-white p-6 sm:p-10 md:p-12 rounded-[2rem] sm:rounded-[2.5rem] shadow-xl border border-slate-100 w-full max-w-md transition-all duration-300">
      
      <!-- Brand Name / Logo -->
      <div class="text-center mb-5 sm:mb-6">
        <h1 class="text-xl sm:text-2xl text-slate-900 font-black tracking-wider uppercase">
          <a href="index.html" class="flex items-center justify-center gap-2 group">
            <i class="title-brand font-bold bi bi-wrench-adjustable-circle text-[#F97316]"></i>
            <span class="title-brand font-bold">MOTO<span class="title-brand text-[#F97316] font-bold">MEDIC</span></span>
          </a>
        </h1>
        <h2 class="text-xl sm:text-2xl font-black uppercase tracking-tight mt-2 sm:mt-3">Create Account</h2>
        <p class="text-zinc-500 text-xs sm:text-sm font-medium mt-1">Join us for easy scheduling and bike tracking.</p>
      </div>

      <!-- SIGNUP FORM -->
      <form class="space-y-3 sm:space-y-4" onsubmit="event.preventDefault();">
        <input type="text" placeholder="Full Name" class="w-full p-3.5 sm:p-4 rounded-xl border border-slate-200 outline-none focus:border-[#F97316] font-medium text-sm transition">
        <input type="email" placeholder="Email Address" class="w-full p-3.5 sm:p-4 rounded-xl border border-slate-200 outline-none focus:border-[#F97316] font-medium text-sm transition">
        
        <div class="relative">
          <input type="password" id="pass" placeholder="Password" class="w-full p-3.5 sm:p-4 pe-12 rounded-xl border border-slate-200 outline-none focus:border-[#F97316] font-medium text-sm transition">
          <i class="bi bi-eye-slash absolute end-4 top-1/2 -translate-y-1/2 cursor-pointer text-slate-400 p-1 text-base" onclick="togglePass('pass')"></i>
        </div>

        <div class="relative">
          <input type="password" id="cpass" placeholder="Confirm Password" class="w-full p-3.5 sm:p-4 pe-12 rounded-xl border border-slate-200 outline-none focus:border-[#F97316] font-medium text-sm transition">
          <i class="bi bi-eye-slash absolute end-4 top-1/2 -translate-y-1/2 cursor-pointer text-slate-400 p-1 text-base" onclick="togglePass('cpass')"></i>
        </div>

        <div class="flex items-center gap-2 pt-1 text-[11px] sm:text-xs font-bold uppercase tracking-wide">
          <input type="checkbox" id="terms" class="accent-[#F97316] w-4 h-4 rounded cursor-pointer">
          <label for="terms" class="text-zinc-500 cursor-pointer select-none">I agree to the Terms & Privacy</label>
        </div>
        
        <button class="w-full bg-[#F97316] text-white font-black py-3.5 sm:py-4 rounded-xl hover:bg-orange-600 active:scale-[0.99] transition uppercase tracking-wider text-sm shadow-lg shadow-orange-500/20 cursor-pointer mt-2">Sign Up</button>
      </form>

      <!-- SOCIAL LOGIN SEPARATOR -->
      <div class="my-5 sm:my-6 flex items-center gap-3">
        <div class="flex-grow h-px bg-zinc-200"></div>
        <span class="text-[9px] sm:text-[10px] text-zinc-400 font-bold uppercase tracking-widest whitespace-nowrap">Or sign up with</span>
        <div class="flex-grow h-px bg-zinc-200"></div>
      </div>

      <!-- SOCIAL BUTTONS -->
      <div class="grid grid-cols-3 gap-3 sm:gap-4">
        <button class="btn-social flex flex-col items-center justify-center gap-1 py-3 px-2 border border-slate-200 rounded-xl hover:bg-slate-50 active:scale-95 transition cursor-pointer">
          <i class="bi bi-google text-red-500 text-base sm:text-lg"></i>
          <span class="text-[10px] font-semibold text-zinc-500">Google</span>
        </button>
        <button class="btn-social flex flex-col items-center justify-center gap-1 py-3 px-2 border border-slate-200 rounded-xl hover:bg-slate-50 active:scale-95 transition cursor-pointer">
          <i class="bi bi-facebook text-blue-600 text-base sm:text-lg"></i>
          <span class="text-[10px] font-semibold text-zinc-500">Facebook</span>
        </button>
        <button class="btn-social flex flex-col items-center justify-center gap-1 py-3 px-2 border border-slate-200 rounded-xl hover:bg-slate-50 active:scale-95 transition cursor-pointer">
          <i class="bi bi-apple text-base sm:text-lg"></i>
          <span class="text-[10px] font-semibold text-zinc-500">Apple</span>
        </button>
      </div>

      <!-- Login Link -->
      <div class="text-center mt-5 sm:mt-6 text-xs sm:text-sm font-medium">
        <p class="text-zinc-500">Already a user? <a href="login.html" class="text-[#F97316] font-bold hover:text-orange-600 transition inline-block ml-1">Log In</a></p>
      </div>
    </div>

  </div>

  <script>
    function togglePass(id) {
      const input = document.getElementById(id);
      const icon = input.nextElementSibling;
      if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("bi-eye-slash", "bi-eye");
      } else {
        input.type = "password";
        icon.classList.replace("bi-eye", "bi-eye-slash");
      }
    }

    function toggleTheme() {
      const html = document.documentElement;
      const themeIcon = document.getElementById("themeIcon");
      if (html.getAttribute('data-theme') === 'dark') {
        html.setAttribute('data-theme', 'light');
        themeIcon.classList.replace("bi-brightness-high-fill", "bi-moon-fill");
      } else {
        html.setAttribute('data-theme', 'dark');
        themeIcon.classList.replace("bi-moon-fill", "bi-brightness-high-fill");
      }
    }

    function toggleRTL() {
      document.documentElement.dir = document.documentElement.dir === 'rtl' ? 'ltr' : 'rtl';
    }
  </script>
</body>
</html>
