<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoMedic | Login</title>
    <link rel="icon" href="images/logo.jpeg">
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Bootstrap Icons Link -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            transition: background 0.3s, color 0.3s;
        }

        [data-theme="dark"] body {
            background-color: #0F172A;
            color: #F8FAFC;
        }

        [data-theme="dark"] .auth-card {
            background-color: #1E293B;
            border-color: #334155;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        [data-theme="dark"] input {
            background-color: #0F172A;
            border-color: #334155;
            color: #F8FAFC;
        }

        [data-theme="dark"] .btn-social {
            background-color: #0F172A;
            border-color: #334155;
            color: #F8FAFC;
        }

        [data-theme="dark"] .btn-social:hover {
            background-color: #334155;
        }

        [data-theme="dark"] .theme-btn {
            background-color: #1E293B !important;
            border-color: #334155 !important;
            color: #F8FAFC !important;
        }

        [data-theme="dark"] .text-slate-900 {
            color: #F8FAFC !important;
        }

        [data-theme="dark"] .title-brand {
            color: #F8FAFC !important;
        }

        [data-theme="dark"] .text-zinc-500 {
            color: #94A3B8 !important;
        }

        [data-theme="dark"] .text-zinc-400 {
            color: #64748B !important;
        }

        [data-theme="dark"] .bg-zinc-200 {
            background-color: #334155 !important;
        }

        h1, h2, h3, h4, h5, h6 {
            font-weight: 550 !important;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-6 relative">

    <!-- Floating Controls -->
    <div class="w-full max-w-md flex justify-end gap-3 mb-4">
        <button onclick="toggleTheme()"
            class="theme-btn bg-white border border-slate-200 p-3 rounded-xl shadow-sm hover:scale-105 transition">
            <i id="themeIcon" class="bi bi-moon-fill"></i>
        </button>
        <button onclick="toggleRTL()"
            class="theme-btn bg-white border border-slate-200 p-3 rounded-xl shadow-sm hover:scale-105 transition">
            <i class="bi bi-arrow-left-right"></i>
        </button>
    </div>

    <div class="auth-card bg-white p-8 md:p-12 rounded-[2.5rem] shadow-xl border border-slate-100 w-full max-w-md">

        <!-- Brand Name / Logo -->
        <div class="text-center mb-8">
            <h1 class="text-2xl text-slate-900 font-black tracking-wider uppercase">
                <a href="index.html" class="flex items-center justify-center gap-2 group">
                    <i class="title-brand font-bold bi bi-wrench-adjustable-circle text-[#F97316]"></i>
                    <span class="title-brand font-bold">MOTO<span class="title-brand text-[#F97316] font-bold">MEDIC</span></span>
                </a>
            </h1>
            <h2 class="text-2xl font-black uppercase tracking-tight mt-4">Welcome Back</h2>
            <p class="text-zinc-500 text-sm font-medium">Access your rider profile and booking records.</p>
        </div>

        <!-- LOGIN FORM -->
        <form class="space-y-4" onsubmit="event.preventDefault();">
            <input type="email" placeholder="Email Address"
                class="w-full p-4 rounded-xl border border-slate-200 outline-none focus:border-[#F97316] font-medium text-sm transition">

            <div class="relative">
                <input type="password" id="pass" placeholder="Password"
                    class="w-full p-4 pe-12 rounded-xl border border-slate-200 outline-none focus:border-[#F97316] font-medium text-sm transition">
                <i class="bi bi-eye-slash absolute end-4 top-1/2 -translate-y-1/2 cursor-pointer text-slate-400"
                    onclick="togglePass('pass')"></i>
            </div>

            <div class="flex items-center justify-between text-xs font-bold">
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="remember" class="accent-[#F97316] w-4 h-4 rounded">
                    <label for="remember" class="text-zinc-500 cursor-pointer">Remember me</label>
                </div>
                <a href="#" class="text-[#F97316] hover:text-orange-600 transition">Forgot Password?</a>
            </div>

            <button
                class="w-full bg-[#F97316] text-white font-black py-4 rounded-xl hover:bg-orange-600 transition uppercase tracking-wider text-sm shadow-lg shadow-orange-500/20">Log
                In</button>
        </form>

        <!-- SOCIAL LOGIN -->
        <div class="my-6 flex items-center gap-4">
            <div class="flex-grow h-px bg-zinc-200"></div>
            <span class="text-[10px] text-zinc-400 font-bold uppercase tracking-widest">Or login with</span>
            <div class="flex-grow h-px bg-zinc-200"></div>
        </div>

        <div class="grid grid-cols-3 gap-4">
            <button
                class="btn-social flex flex-col items-center justify-center gap-1 py-3 px-2 border border-slate-200 rounded-xl hover:bg-slate-50 transition">
                <i class="bi bi-google text-red-500 text-lg"></i>
                <span class="text-[10px] font-semibold text-zinc-500">Google</span>
            </button>
            <button
                class="btn-social flex flex-col items-center justify-center gap-1 py-3 px-2 border border-slate-200 rounded-xl hover:bg-slate-50 transition">
                <i class="bi bi-facebook text-blue-600 text-lg"></i>
                <span class="text-[10px] font-semibold text-zinc-500">Facebook</span>
            </button>
            <button
                class="btn-social flex flex-col items-center justify-center gap-1 py-3 px-2 border border-slate-200 rounded-xl hover:bg-slate-50 transition">
                <i class="bi bi-apple text-lg"></i>
                <span class="text-[10px] font-semibold text-zinc-500">Apple</span>
            </button>
        </div>

        <div class="text-center mt-6 text-sm font-medium">
            <p class="text-zinc-500">New to MotoMedic? <a href="sign.html"
                    class="text-[#F97316] font-bold hover:text-orange-600 transition">Create Account</a></p>
        </div>
    </div>

    <script>
        function togglePass(id) {
            const input = document.getElementById(id);
            const icon = input.nextElementSibling;
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("bi-eye-slash", "bi-eye");
            } else {
                input.type = "password";
                icon.classList.replace("bi-eye", "bi-eye-slash");
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const themeIcon = document.getElementById("themeIcon");
            if (html.getAttribute('data-theme') === 'dark') {
                html.setAttribute('data-theme', 'light');
                themeIcon.classList.replace("bi-brightness-high-fill", "bi-moon-fill");
            } else {
                html.setAttribute('data-theme', 'dark');
                themeIcon.classList.replace("bi-moon-fill", "bi-brightness-high-fill");
            }
        }

        function toggleRTL() {
            document.documentElement.dir = document.documentElement.dir === 'rtl' ? 'ltr' : 'rtl';
        }
    </script>
</body>

</html>
