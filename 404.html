<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MotoMedic | 404 Page Not Found</title>
  <link rel="icon" href="images/logo.jpeg">
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Bootstrap Icons Link -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  
</head>
<body class="bg-slate-50 min-h-full flex flex-col w-full antialiased selection:bg-orange-500 selection:text-white">

  <!-- Main Scrollable Wrapper -->
  <div class="flex-grow flex flex-col justify-center items-center px-4 py-6 sm:p-8">
    <!-- Error Card -->
    <div class="error-card bg-white p-8 sm:p-12 rounded-[2rem] sm:rounded-[2.5rem] shadow-xl border border-slate-100 w-full max-w-md text-center transition-all duration-300">
      
      <!-- Brand Logo -->
      <div class="flex justify-center mb-6">
        <h1 class="text-xl sm:text-2xl text-slate-900 font-black tracking-wider uppercase">
          <a href="index.html" class="flex items-center gap-2 group">
            <i class="bi bi-wrench-adjustable-circle text-[#F97316] font-bold"></i>
            <span class="title-brand font-bold">MOTO<span class="text-[#F97316] font-bold">MEDIC</span></span>
          </a>
        </h1>
      </div>

      <!-- 404 Illustration representation -->
      <div class="relative inline-block mb-4">
        <h2 class="text-7xl sm:text-8xl font-black text-slate-900 tracking-tight select-none opacity-10">404</h2>
        <div class="absolute inset-0 flex items-center justify-center">
          <i class="bi bi-exclamation-triangle-fill text-5xl sm:text-6xl text-[#F97316] animate-bounce"></i>
        </div>
      </div>

      <!-- Error Text -->
      <h3 class="text-xl sm:text-2xl font-black uppercase tracking-tight text-slate-900">Engine Stall!</h3>
      <p class="text-zinc-500 text-xs sm:text-sm font-medium mt-2 max-w-xs mx-auto">
        Looks like you took a wrong turn. The route or diagnostic page you are searching for doesn't exist.
      </p>

      <!-- Action Buttons -->
      <div class="flex flex-col sm:flex-row gap-3 mt-8 text-xs font-bold uppercase tracking-wide">
        <!-- Back Button -->
        <button onclick="history.back()" class="btn-secondary flex-1 border border-slate-200 bg-white py-3.5 rounded-xl hover:bg-slate-50 active:scale-[0.98] transition cursor-pointer flex items-center justify-center gap-2">
          <i class="bi bi-arrow-left"></i> Go Back
        </button>
        <!-- Home Button -->
        <a href="index.html" class="flex-1 bg-[#F97316] text-white py-3.5 rounded-xl hover:bg-orange-600 active:scale-[0.98] transition shadow-lg shadow-orange-500/20 text-center flex items-center justify-center gap-2 cursor-pointer">
          <i class="bi bi-house-door"></i> Home Base
        </a>
      </div>

    </div>

  </div>
</body>
</html>
